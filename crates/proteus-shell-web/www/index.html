<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proteus — Reference Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: #9090a8;
    }

    h1 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0.6;
    }

    canvas {
      display: block;
      width: 1000px;
      height: 700px;
      /* Crisp pixels — no browser smoothing */
      image-rendering: pixelated;
    }

    #status {
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.4;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <h1>Proteus · Reference Demo</h1>

  <!--
    Canvas dimensions must match what ProteusApp.init reads via canvas.width / canvas.height.
    The CSS width/height only controls display size (pixel density handled by devicePixelRatio).
    For simplicity this demo uses 1:1 logical pixels.
  -->
  <canvas id="proteus-canvas" width="1000" height="700"></canvas>
  <p id="status">Loading…</p>

  <script type="module">
    // wasm-pack emits the glue module at pkg/proteus_shell_web.js.
    // Run: wasm-pack build crates/proteus-shell-web --target web --out-dir www/pkg
    import init, { ProteusApp } from './pkg/proteus_shell_web.js';

    async function main() {
      const status = document.getElementById('status');

      try {
        await init();
        status.textContent = 'Initialising GPU…';

        const app = await ProteusApp.init('proteus-canvas');
        status.textContent = 'Running';

        // Handle canvas resize (keeps logical pixels in sync with CSS layout).
        const canvas = document.getElementById('proteus-canvas');
        const observer = new ResizeObserver(() => {
          const w = Math.max(1, canvas.clientWidth);
          const h = Math.max(1, canvas.clientHeight);
          canvas.width = w;
          canvas.height = h;
          app.resize(w, h);
        });
        observer.observe(canvas);

        // Wire pointer events → wasm (M7 interactivity).
        // offsetX/offsetY are in CSS pixels, which match the logical coordinate
        // system used by hit_test_system (1:1 since canvas resolution = clientWidth).
        canvas.addEventListener('mousemove',  e => app.on_mouse_move(e.offsetX, e.offsetY));
        canvas.addEventListener('mouseleave', () => app.on_mouse_leave());
        canvas.addEventListener('mousedown',  e => { if (e.button === 0) app.on_mouse_down(); });
        canvas.addEventListener('mouseup',    e => { if (e.button === 0) app.on_mouse_up(); });

        // ── Box-cover images (M9.7) ────────────────────────────────────────
        //
        // No fetch on the Rust side — bytes are pulled over HTTP here and
        // handed to wasm via set_tile_image(); bake_pending_images() (run
        // every tick()) decodes and uploads them to main_atlas from there.
        // Fire-and-forget: a failed fetch just leaves that tile on its
        // placeholder TILE_COLORS fill (set_tile_image is simply never
        // called for it).
        const TILE_IMAGE_SRCS = [
          'images/Big_buck_bunny.jpg',
          'images/sintel.jpg',
          'images/jellyfish.jpg',
        ];
        TILE_IMAGE_SRCS.forEach((src, tileIdx) => {
          fetch(src)
            .then(res => {
              if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
              return res.arrayBuffer();
            })
            .then(buf => app.set_tile_image(tileIdx, new Uint8Array(buf)))
            .catch(err => console.warn(`tile ${tileIdx}: could not load ${src}:`, err));
        });

        // ── MP4 playback (M9.5) ────────────────────────────────────────────
        //
        // No decode thread here — the browser's own <video> element is the
        // decoder. Rust owns hit-testing (there's no per-tile DOM element to
        // attach a click listener to), so it signals *when* to start/stop via
        // take_video_start_tile()/take_video_stop(), polled once per tick();
        // this side just drives a hidden <video>, extracts decoded frames
        // onto an offscreen canvas, and pushes the pixels back into wasm.
        const TILE_VIDEO_SRCS = [
          'videos/big_buck_bunny.mp4',
          'videos/sintel.mp4',
          'videos/jellyfish.mp4',
        ];

        const video = document.createElement('video');
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';
        video.loop = true; // demo playback loops rather than stopping at EOF
        video.style.display = 'none';
        document.body.appendChild(video);

        const frameCanvas = document.createElement('canvas');
        const frameCtx = frameCanvas.getContext('2d', { willReadFrequently: true });

        // Bumped on every start/stop so a stray callback from a video that's
        // no longer current (e.g. the user clicked another tile, or clicked
        // the screen to stop, right as a callback was in flight) is dropped
        // instead of pushing frames into whatever's playing now.
        let playbackGeneration = 0;

        function pushCurrentFrame() {
          frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
          const { data } = frameCtx.getImageData(0, 0, frameCanvas.width, frameCanvas.height);
          app.push_video_frame(data);
        }

        function frameLoop(generation) {
          if (generation !== playbackGeneration || video.paused || video.ended) return;
          pushCurrentFrame();
          if ('requestVideoFrameCallback' in video) {
            video.requestVideoFrameCallback(() => frameLoop(generation));
          } else {
            // Fallback for browsers without requestVideoFrameCallback
            // (e.g. older Firefox): just keep pace with rAF instead.
            requestAnimationFrame(() => frameLoop(generation));
          }
        }

        function startVideo(tileIdx) {
          playbackGeneration++;
          const generation = playbackGeneration;
          video.src = TILE_VIDEO_SRCS[tileIdx];
          video.addEventListener('loadedmetadata', () => {
            if (generation !== playbackGeneration) return; // superseded before it loaded
            frameCanvas.width = video.videoWidth;
            frameCanvas.height = video.videoHeight;
            app.start_video(tileIdx, video.videoWidth, video.videoHeight);
            video.play().then(() => frameLoop(generation)).catch(err => {
              console.error('video.play() failed:', err);
            });
          }, { once: true });
        }

        function stopVideo() {
          playbackGeneration++; // invalidates any in-flight frameLoop callback
          video.pause();
        }

        // Drive the render loop via requestAnimationFrame.
        let lastTs = null;
        function frame(ts) {
          const dt = lastTs !== null ? ts - lastTs : 0;
          lastTs = ts;
          app.tick(dt);          // dt in milliseconds

          const startTile = app.take_video_start_tile();
          if (startTile !== undefined) startVideo(startTile);
          if (app.take_video_stop()) stopVideo();

          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

      } catch (err) {
        console.error('Proteus init error:', err);
        status.textContent = `Error: ${err}`;
      }
    }

    main();
  </script>
</body>
</html>
