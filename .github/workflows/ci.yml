name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-

      - name: Install software GPU (headless render test)
        # lavapipe is Mesa's CPU-based Vulkan implementation — gives wgpu a
        # real adapter on the GitHub Actions Ubuntu runner (no hardware GPU).
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq libvulkan1 mesa-vulkan-drivers

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all
        env:
          # Force wgpu to use the Vulkan backend so it picks up lavapipe.
          WGPU_BACKEND: vulkan

  wasm:
    # WASM output is platform-independent — one Ubuntu build is sufficient.
    # macOS and Windows runners would produce identical .wasm bytes at 3× the cost.
    name: WASM build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + wasm target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-wasm-cargo-

      - name: Cache wasm-pack binary
        uses: actions/cache@v4
        id: cache-wasm-pack
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ubuntu-wasm-pack-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: wasm-pack build (web shell)
        run: wasm-pack build crates/proteus-shell-web --target web
